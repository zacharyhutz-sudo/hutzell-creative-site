<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><meta content="width=device-width, initial-scale=1" name="viewport"/><title>Inquiry — Hutzell Creative Co.</title><link href="https://fonts.googleapis.com/css2?family=Della+Respira&amp;family=Pinyon+Script&amp;display=swap" rel="stylesheet"/><link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/><link href="style.css" rel="stylesheet"/><style>
    .contact-wrapper {
      max-width: 900px;
      margin: 60px auto;
      background: #fff;
      border: 1px solid var(--accent);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 8px 30px rgba(0,0,0,.05);
    }

    /* Title -> EB Garamond + centered */
    .contact-title {
      font-family: 'EB Garamond', serif !important;
      font-weight: 600;
      font-size: clamp(36px, 4vw, 46px);
      margin: 0 0 12px 0;
      text-align: center;
      letter-spacing: .2px;
      color: var(--ink);
    }

    .contact-intro {
      font-family: "Della Respira", serif;
      text-align: center;
      margin-bottom: 24px;
      color: var(--muted);
    }

    /* Service selector (full width, above the grid) */
    .service-options {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 28px;
    }
    .service-btn {
      padding: 10px 18px;
      border-radius: 999px;
      border: 2px solid var(--green);
      background: #fff;
      color: var(--green);
      font-family: "Della Respira", serif;
      font-size: 15px;
      cursor: pointer;
      transition: all .2s ease;
    }
    .service-btn:hover { transform: translateY(-1px); }
    .service-btn.active { background: var(--green); color: #fff; }

    /* Two-column form grid (desktop); 1-column on small screens */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    @media (max-width: 720px) {
      .form-grid { grid-template-columns: 1fr; }
    }

    form label {
      display: block;
      margin: 10px 0 6px;
      font-weight: 600;
      font-family: "Della Respira", serif;
    }
    form input, form textarea, form select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--accent);
      font-family: "Della Respira", serif;
      background: #fff;
    }

    /* Make certain rows span full width */
    .full-width { grid-column: 1 / -1; }

    /* Message is always full width and tall */
    #message { min-height: 160px; }

    .submit-btn {
      margin-top: 10px;
      display: inline-block;
      background: var(--green);
      color: #fff;
      padding: 14px 28px;
      border-radius: 8px;
      border: none;
      font-family: "Della Respira", serif;
      font-size: 16px;
      cursor: pointer;
      transition: background .2s ease, transform .1s ease;
    }
    .submit-btn:hover { background: var(--green-2); transform: translateY(-1px); }

    /* Make all inputs uniform in size */
form input, form select, form textarea {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid var(--accent);
  font-family: "Della Respira", serif;
  font-size: 15px;
  box-sizing: border-box;
}

/* Force date inputs to match height of text inputs */
form input[type="date"] {
  line-height: normal;
  height: 48px; /* matches text inputs */
}

/* Optional: normalize select dropdowns if you add one later */
form select {
  height: 48px;
}
  </style><style>
/* === Mobile-only header unification (match Services) === */
@media (max-width: 899px){
  html, body { margin:0; padding:0; overflow-x:hidden !important; touch-action: pan-y; -webkit-text-size-adjust:100%; }
  header{ position: sticky; top:0; z-index:40; padding-top: max(2px, env(safe-area-inset-top)); background: rgba(255,255,255,0.92); backdrop-filter: saturate(160%) blur(8px); }
  .nav{ display:grid !important; grid-template-columns:auto 1fr; align-items:center; gap:10px; padding:6px 12px !important; }
  .brand{ order:1; }
  .brand .brand-logo{ height:66px !important; max-height:66px !important; width:auto; display:block; }
  header nav{ order:2; justify-self:end; }
  header nav ul{ display:flex; gap:12px; align-items:center; margin:0; padding:0; }
  .nav-script{ display:inline-block; padding:6px 12px; border-radius:999px; }
}
</style></head><body><header><div class="container nav"><div class="brand"><a class="brand-link" href="index.html"><img alt="Hutzell Creative Co. logo" class="brand-logo" src="assets/logo.png"/></a></div><nav><ul><li><a class="nav-script" href="index.html">Home</a></li><li><a class="nav-script" href="services.html">Services</a></li><li><a class="nav-script active" href="contact.html">Inquiry</a></li></ul></nav></div></header><div class="contact-wrapper"><h1 class="contact-title">Let’s Connect</h1><p class="contact-intro">We’d love to hear from you. Select a service and fill out the form below.</p><div class="service-options"><button class="service-btn" data-value="Photography" type="button">Photography</button><button class="service-btn" data-value="Videography" type="button">Videography</button><button class="service-btn" data-value="Graphic Design" type="button">Graphic Design</button><button class="service-btn" data-value="Other" type="button">Other</button></div><form action="https://formspree.io/f/xvgqjkno" method="POST"><input id="serviceField" name="service" type="hidden"/><div class="form-grid"><div><label for="name">Your Name</label><input autocomplete="name" id="name" name="name" required="" type="text"/></div><div><label for="email">Your Email</label><input autocomplete="email" id="email" name="_replyto" required="" type="email"/></div><div><label for="phone">Your Phone Number</label><input autocomplete="tel" id="phone" inputmode="tel" name="phone" type="tel"/></div><div><label for="eventDate">Event Date (If any)</label><input id="eventDate" name="event_date" type="date"/></div><div><label for="eventLocation">Event Location (If any)</label><input id="eventLocation" name="event_location" placeholder="City, venue, or address" type="text"/></div><div><label for="referral">How’d You Hear About Us?</label><select id="referral" name="referral"><option disabled="" selected="" value="">Choose one…</option><option>Friend / Family</option><option>Instagram</option><option>Facebook</option><option>Google Search</option><option>Venue / Vendor Referral</option><option>Other</option></select></div><div class="full-width"><label for="pinterest">Your Pinterest Board (If You Have One)</label><input id="pinterest" name="pinterest_board" placeholder="https://www.pinterest.com/your-board" type="url"/></div><div class="full-width"><label for="message">Message</label><textarea id="message" name="message" placeholder="Tell us a little about your project, date, and vision…" required=""></textarea></div></div><button class="submit-btn" type="submit">Send Inquiry</button></form></div><footer class="footer"><div class="container">© <span id="year"></span> Hutzell Creative Co.</div></footer><script>document.getElementById('year').textContent=new Date().getFullYear();</script><script>
    // Toggle active service button + set hidden field
    const serviceBtns = document.querySelectorAll('.service-btn');
    const serviceField = document.getElementById('serviceField');
    serviceBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        serviceBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        serviceField.value = btn.dataset.value;
      });
    });
  </script><script src="main.js"></script></body></html>
