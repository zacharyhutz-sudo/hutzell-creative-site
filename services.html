<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hutzell Creative Co. — Services</title>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&family=Della+Respira&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* --- Performance-focused, filename-safe version (JPG only) --- */
    .photo-section { padding: 48px 0; }
    .photo-section h2 { text-align:center; font-family:'EB Garamond',serif; font-weight:500; margin-bottom:20px; }

    .photo-slider { position: relative; overflow: hidden; }
    .photo-slider .viewport { position:relative; width:100%; max-width:1100px; margin:0 auto; }

    /* Soft gradient backdrop only (no image double-load) */
    .photo-slider .viewport::before {
      content:""; position:absolute; inset:-40px; z-index:0; border-radius:24px;
      background: radial-gradient(1200px 400px at 50% -10%, rgba(0,0,0,0.06), transparent),
                  radial-gradient(800px 300px at 50% 110%, rgba(0,0,0,0.05), transparent);
      filter: blur(24px) saturate(110%);
      transform: scale(1.05);
    }
    .photo-slider .frame { position:relative; z-index:1; border-radius:20px; overflow:hidden; }

    .slides { display:grid; grid-auto-flow:column; grid-auto-columns:100%; align-items:center; }
    .slide { display:flex; align-items:center; justify-content:center; }
    .slide img { display:block; width:100%; height:auto; aspect-ratio: 3 / 2; }

    .controls { display:flex; justify-content:center; gap:12px; margin-top:12px; }
    .btn { border:1px solid #ddd; padding:8px 14px; border-radius:999px; cursor:pointer; background:#fff; }

    @media (prefers-reduced-motion: reduce) {
      .slides { scroll-behavior:auto; }
    }
  </style>
</head>
<body>
<header>
  <div class="container nav">
    <div class="brand"><a class="brand-link" href="index.html"><img class="brand-logo" src="assets/logo.png" alt="Hutzell Creative Co." /></a></div>
    <nav><ul>
      <li><a class="nav-script" href="index.html">Home</a></li>
      <li><a class="nav-script active" href="services.html">Services</a></li>
      <li><a class="nav-script" href="contact.html">Inquiry</a></li>
    </ul></nav>
  </div>
</header>

<main>
  <!-- Families Gallery -->
  <section class="photo-section" id="families">
    <h2>Families</h2>
    <!-- Keep original JPG file names. List them here; first one is eagerly loaded. -->
    <div class="photo-slider" data-files="f1.jpg,f2.jpg,f3.jpg,f4.jpg,f5.jpg,f6.jpg,f7.jpg,f8.jpg,f9.jpg,f10.jpg,f11.jpg,f12.jpg,f13.jpg,f14.jpg,f15.jpg,f16.jpg,f17.jpg,f18.jpg,f19.jpg,f20.jpg,f21.jpg,f22.jpg">
      <div class="viewport">
        <div class="frame">
          <div class="slides" data-index="0">
            <!-- First slide inserted by JS as eager -->
          </div>
        </div>
      </div>
      <div class="controls">
        <button class="btn prev" type="button" aria-label="Previous">‹</button>
        <button class="btn next" type="button" aria-label="Next">›</button>
      </div>
    </div>
  </section>

  <!-- Weddings Gallery -->
  <section class="photo-section" id="weddings">
    <h2>Weddings</h2>
    <div class="photo-slider" data-files="w1.jpg,w2.jpg,w3.jpg,w4.jpg,w5.jpg">
      <div class="viewport">
        <div class="frame">
          <div class="slides" data-index="0"></div>
        </div>
      </div>
      <div class="controls">
        <button class="btn prev" type="button" aria-label="Previous">‹</button>
        <button class="btn next" type="button" aria-label="Next">›</button>
      </div>
    </div>
  </section>

  <!-- Seniors Gallery -->
  <section class="photo-section" id="seniors">
    <h2>Seniors</h2>
    <div class="photo-slider" data-files="s1.jpg,s3.jpg,s4.jpg,s10.jpg,s14.jpg,s17.jpg">
      <div class="viewport">
        <div class="frame">
          <div class="slides" data-index="0"></div>
        </div>
      </div>
      <div class="controls">
        <button class="btn prev" type="button" aria-label="Previous">‹</button>
        <button class="btn next" type="button" aria-label="Next">›</button>
      </div>
    </div>
  </section>
</main>

<footer class="footer"><div class="container">© <span id="year"></span> Hutzell Creative Co.</div></footer>

<script>
  // Year
  document.getElementById('year').textContent = new Date().getFullYear();

  // Helper to create a slide <img> from a plain JPG filename (keeps names the same)
  function createImg(src, alt, eager) {
    const img = document.createElement('img');
    img.alt = alt || '';
    img.decoding = 'async';
    img.loading = eager ? 'eager' : 'lazy';
    if (eager) img.fetchPriority = 'high';
    img.width = 1600; // safe default; adjust if your originals differ
    img.height = 1067;
    img.src = src;
    return img;
  }

  function makeSlide(node) {
    const div = document.createElement('div');
    div.className = 'slide';
    if (node) div.appendChild(node);
    return div;
  }

  function initSlider(slider) {
    const folder = 'assets/img/';
    const files = (slider.getAttribute('data-files') || '').split(',').map(s => s.trim()).filter(Boolean);
    const slidesWrap = slider.querySelector('.slides');
    const slides = [];
    files.forEach((fname, i) => {
      if (i === 0) {
        const img = createImg(folder + fname, fname.replace(/\..+$/, '').toUpperCase(), true);
        const s = makeSlide(img);
        s.classList.add('is-active');
        slidesWrap.appendChild(s);
        slides.push(s);
      } else {
        const s = makeSlide();
        s.dataset.src = folder + fname; // lazy source (exact filename retained)
        s.dataset.alt = fname.replace(/\..+$/, '');
        slidesWrap.appendChild(s);
        slides.push(s);
      }
    });

    let index = 0;

    function ensureLoaded(i) {
      const s = slides[i];
      if (!s || s.dataset.loaded) return;
      const img = createImg(s.dataset.src, s.dataset.alt, false);
      s.appendChild(img);
      s.dataset.loaded = '1';
    }

    function preloadNeighbors() {
      ensureLoaded(index);
      ensureLoaded(index + 1);
      ensureLoaded(index - 1);
    }

    function go(dir) {
      const total = slides.length;
      index = (index + dir + total) % total;
      slides.forEach((s, i) => s.classList.toggle('is-active', i === index));
      preloadNeighbors();
    }

    slider.querySelector('.prev')?.addEventListener('click', () => go(-1));
    slider.querySelector('.next')?.addEventListener('click', () => go(1));

    // Lazy-build when near viewport
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          preloadNeighbors();
          io.disconnect();
        }
      });
    }, { rootMargin: '600px' });
    io.observe(slider);
  }

  document.querySelectorAll('.photo-slider').forEach(initSlider);
</script>
</body>
</html>
